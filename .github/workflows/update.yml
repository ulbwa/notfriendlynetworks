name: Update lists

on:
  schedule:
    # Weekly, Sunday 00:00 UTC.
    - cron: "0 0 * * 0"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-lists
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install sing-box
        run: |
          set -euo pipefail
          version="$(curl -fsSL https://api.github.com/repos/SagerNet/sing-box/releases/latest \
            | python3 -c "import sys, json; print(json.load(sys.stdin)['tag_name'].lstrip('v'))")"
          echo "Installing sing-box ${version}"
          curl -fsSL -o sing-box.tar.gz \
            "https://github.com/SagerNet/sing-box/releases/download/v${version}/sing-box-${version}-linux-amd64.tar.gz"
          tar -xzf sing-box.tar.gz
          sudo install "sing-box-${version}-linux-amd64/sing-box" /usr/local/bin/sing-box
          sing-box version

      - name: Build rule-sets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python scripts/build.py

      - name: Commit and push changes
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update domain & subnet lists ($(date -u +%Y-%m-%d))"
            git push
          fi
